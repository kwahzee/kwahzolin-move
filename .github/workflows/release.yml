name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t kwahzolin-builder -f scripts/Dockerfile .

      - name: Cross-compile module
        run: |
          docker run --rm \
            -v "$PWD:/build" \
            -u "$(id -u):$(id -g)" \
            -e CROSS_PREFIX_OVERRIDE=1 \
            kwahzolin-builder

      - name: Verify tarball
        run: |
          ls -lh dist/kwahzolin-module.tar.gz
          tar -tzf dist/kwahzolin-module.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/kwahzolin-module.tar.gz

      - name: Update release.json
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO="${GITHUB_REPOSITORY}"
          cat > release.json <<EOF
          {
            "version": "$VERSION",
            "download_url": "https://github.com/$REPO/releases/download/v$VERSION/kwahzolin-module.tar.gz"
          }
          EOF

      - name: Commit release.json
        run: |
          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"
          git fetch origin main
          git checkout main
          git add release.json
          git diff --staged --quiet || git commit -m "release: update release.json for v${GITHUB_REF#refs/tags/v}"
          git push origin main
